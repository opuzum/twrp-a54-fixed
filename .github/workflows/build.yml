name: Recovery Build (Max Space)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Maximize Build Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf /etc/mysql
        sudo rm -rf /etc/php
        docker image prune -a -f
        df -h # Shows how much space we cleared

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install bc build-essential zip curl libstdc++6 git python3 python-is-python3 libxml2-utils wget openjdk-17-jdk -y

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Sync Source (Slim)
      run: |
        mkdir ~/twrp
        cd ~/twrp
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd ~/twrp
        git clone --depth=1 https://github.com/Nitorac/android_device_samsung_a54x device/samsung/a54x

    - name: Build TWRP
      run: |
        cd ~/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_a54x-eng
        make recoveryimage -j$(nproc)

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-A54-Image
        path: /home/runner/twrp/out/target/product/a54x/recovery.img
