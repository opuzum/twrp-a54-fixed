task:
  name: Build TWRP A54
  # Use a powerful container with enough RAM and CPU
  container:
    image: ubuntu:22.04
    cpu: 8
    memory: 24G

  env:
    # Environment variables for the build
    ALLOW_MISSING_DEPENDENCIES: "true"

  install_dependencies_script:
    - apt update
    - apt install bc build-essential zip curl libstdc++6 git python3 python-is-python3 libxml2-utils wget openjdk-17-jdk -y
    - mkdir -p ~/bin
    - curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
    - chmod a+x ~/bin/repo

  sync_script:
    - export PATH="$HOME/bin:$PATH"
    - mkdir ~/twrp && cd ~/twrp
    - repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
    - repo sync -c -j8 --force-sync --no-clone-bundle --no-tags

  clone_device_script:
    - cd ~/twrp
    - git clone --depth=1 https://github.com/Nitorac/android_device_samsung_a54x device/samsung/a54x

  build_script:
    - export PATH="$HOME/bin:$PATH"
    - cd ~/twrp
    - . build/envsetup.sh
    - lunch twrp_a54x-eng
    - make recoveryimage -j8

  # This tells Cirrus where to find your finished file
  recovery_artifacts:
    path: "~/twrp/out/target/product/a54x/recovery.img"

