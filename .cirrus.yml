task:
  name: Build TWRP A54
  container:
    image: ubuntu:22.04
    cpu: 8
    memory: 24G
  
  timeout_in: 120m

  env:
    ALLOW_MISSING_DEPENDENCIES: "true"
    USE_CCACHE: 1
    CCACHE_SIZE: "5G"

  install_dependencies_script:
    - apt update
    - apt install bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync wget openjdk-17-jdk python3 python-is-python3 -y
    - mkdir -p ~/bin
    - curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
    - chmod a+x ~/bin/repo
    # Standard Linux path export (Replaced the broken $GITHUB_PATH line)
    - export PATH="$HOME/bin:$PATH"

  sync_script:
    # We must export the path in every block because Cirrus doesn't carry it over
    - export PATH="$HOME/bin:$PATH"
    - mkdir ~/twrp && cd ~/twrp
    - repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
    - repo sync -c -j8 --force-sync --no-clone-bundle --no-tags

  clone_device_script:
    - cd ~/twrp
    - git clone --depth=1 https://github.com/Nitorac/android_device_samsung_a54x device/samsung/a54x

  build_script:
    - export PATH="$HOME/bin:$PATH"
    - cd ~/twrp
    - . build/envsetup.sh
    - lunch twrp_a54x-eng
    - make recoveryimage -j8

  recovery_artifacts:
    path: "twrp/out/target/product/a54x/recovery.img"
